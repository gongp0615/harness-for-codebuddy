block:
  - pattern: "git\\s+reset\\s+--hard"
    reason: "git reset --hard can discard local work."
  - pattern: "git\\s+clean\\s+-fdx"
    reason: "git clean -fdx can delete untracked work."
  - pattern: "rm\\s+-rf\\s+/(?:\\s|$)"
    reason: "root-level rm -rf is destructive."
  - pattern: "mkfs\\."
    reason: "filesystem formatting commands are blocked."
  - pattern: "\\bdd\\s+if="
    reason: "raw disk copy commands are blocked."
  - pattern: "\\bdrop\\s+database\\b"
    reason: "destructive database commands are blocked."
  - pattern: "\\btruncate\\s+table\\b"
    reason: "destructive database commands are blocked."
warn:
  - pattern: "git\\s+push\\b"
    reason: "pushing changes has remote side effects."
approval:
  - pattern: "npm\\s+publish\\b"
    reason: "package publishing requires explicit approval."
  - pattern: "\\bdeploy\\b"
    reason: "production deployment requires explicit approval."
  - pattern: "kubectl\\s+delete\\b"
    reason: "cluster deletion requires explicit approval."
